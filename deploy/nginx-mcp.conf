# mcp.thefriday.xyz → viral-mcp:3030
# Installed at /opt/signal/infra/nginx/conf.d/mcp.conf inside signal-nginx.
# The HTTPS block is appended by deploy/finish-tls.sh once the certificate exists.

server {
    listen 80;
    server_name mcp.thefriday.xyz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
