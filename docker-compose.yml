services:
  viral-mcp:
    build: .
    container_name: viral-mcp
    restart: unless-stopped
    ports:
      - "127.0.0.1:3030:3030" # local debugging via SSH tunnel only
    env_file:
      - .env
    networks:
      - signal-net # shared with signal-nginx, which terminates TLS for mcp.thefriday.xyz

networks:
  signal-net:
    external: true
    name: signal_signal-net
